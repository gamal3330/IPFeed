<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /opt/ipfeed/ipfeed

    SetEnv IP_FEED_PROJECT_DIR /opt/ipfeed
    SetEnv IP_FEED_SETTINGS_DIR /var/lib/ipfeed
    SetEnv IP_FEED_CONFIG_FILE /var/lib/ipfeed/config.php
    SetEnv IP_FEED_FEED_FILE /var/lib/ipfeed/ips.txt

    <Directory /opt/ipfeed/ipfeed>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /opt/ipfeed/ipfeed/app>
        Require all denied
    </Directory>

    <Directory /var/lib/ipfeed>
        Require all denied
    </Directory>

    DirectoryIndex index.php
    ErrorLog ${APACHE_LOG_DIR}/ipfeed-error.log
    CustomLog ${APACHE_LOG_DIR}/ipfeed-access.log combined
</VirtualHost>
