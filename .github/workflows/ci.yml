name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install runtime tools
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli php-sqlite3 python3 sqlite3

      - name: Check PHP extensions
        run: |
          php -m | grep -qi '^pdo_sqlite$'
          php -m | grep -qi '^sqlite3$'

      - name: Lint PHP
        run: |
          find ipfeed ip-feed-manager-private -name '*.php' -not -path '*/vendor/*' -print0 \
            | xargs -0 -n1 php -l

      - name: Check shell scripts
        run: |
          bash -n install.sh doctor.sh docker/entrypoint.sh

      - name: Check Python scripts
        run: |
          python3 -m py_compile \
            ip-feed-manager-private/backup.py \
            ip-feed-manager-private/run_migrations.py \
            ip-feed-manager-private/migrate_json_to_sqlite.py

      - name: Run installer and doctor
        run: |
          tmpdir="$(mktemp -d)"
          ./install.sh \
            --project-dir "$PWD" \
            --private-dir "$tmpdir/private" \
            --feed-file "$tmpdir/public/ips.txt" \
            --web-user "$(id -un)" \
            --skip-composer
          ./doctor.sh \
            --project-dir "$PWD" \
            --private-dir "$tmpdir/private" \
            --feed-file "$tmpdir/public/ips.txt" \
            --web-user "$(id -un)"
          sqlite3 "$tmpdir/private/ip_feed.sqlite" 'pragma integrity_check;'

      - name: Prevent runtime files in Git
        run: |
          ! git ls-files | grep -E '(^ipfeed/ips\.txt$|^ip-feed-manager-private/(config\.php|.*\.sqlite|users\.json|ips_log\.json|ip_geo_cache\.json|visitor_geo_cache\.json|vt_settings\.json|vt_rate_limit\.json|login_attempts\.json)$)'

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ipfeed:ci .
